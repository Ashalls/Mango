<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh;
      background: radial-gradient(ellipse at center, #1e2a1e 0%, #141414 70%);
      border-radius: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0; -webkit-app-region: drag; overflow: hidden;
    }
    img {
      width: 260px; height: 260px; object-fit: contain; margin-bottom: 12px;
      filter: drop-shadow(0 0 30px rgba(76, 175, 80, 0.3));
    }
    .version { font-size: 14px; color: #8aab8a; margin-bottom: 20px; }
    .status { font-size: 12px; color: #666; }
    .dot { display: inline-block; animation: pulse 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <img src="splash.png" alt="Mango" />
  <div class="version" id="version">v0.2.0</div>
  <div class="status" id="status">
    Checking for updates<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
</body>
</html>
